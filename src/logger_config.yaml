version: 1
formatters:
  simple:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  enhanced:
    format: "%(asctime)s - %(module)s - %(name)s - %(levelname)s - %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    level: DEBUG
    formatter: enhanced
    stream: ext://sys.stdout
  rotate_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: enhanced
    filename: logs/python_template.log
    mode: a
    maxBytes: 20485760
    backupCount: 10
loggers:
  sampleLogger:
    level: DEBUG
    handlers: [console, rotate_file]
    propagate: no
root:
  level: INFO
  handlers: [console, rotate_file]
